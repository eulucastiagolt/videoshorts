<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoShorts Example</title>
  <link rel="stylesheet" href="videoshots.css">
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    
    h2 {
      margin-top: 40px;
    }
    
    #controls {
      margin-top: 20px;
      padding: 16px;
      background: #fff;
      border-radius: 8px;
    }
    
    #controls button {
      margin: 4px;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background: #333;
      color: #fff;
      cursor: pointer;
    }
    
    #controls button:hover {
      background: #555;
    }
    
    #controls hr {
      margin: 12px 0;
      border: none;
      border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h2>Shorts (9/16)</h2>
  <div id="video-container-shorts" data-videoshort></div>

  <h2> Videos (16/9)</h2>
  <div id="video-container-normal" data-videoshort></div>

<div id="controls">
    <strong>Shorts Controls:</strong><br>
    <button onclick="shorts.play()">Play All</button>
    <button onclick="shorts.pause()">Pause All</button>
    <button onclick="shorts.stop()">Stop All</button>
    <button onclick="shorts.mute()">Mute All</button>
    <button onclick="shorts.unMute()">Unmute All</button>
    <button onclick="shorts.setVolume(50)">Volume 50%</button>
    <button onclick="shorts.cueVideo(0, 0)">Cue Video 0 at 0s</button>
    <hr>
    <strong>Normal Videos Controls:</strong><br>
    <button onclick="normal.play()">Play All</button>
    <button onclick="normal.pause()">Pause All</button>
    <button onclick="normal.mute()">Mute All</button>
    <button onclick="normal.unMute()">Unmute All</button>
    <button onclick="normal.cueVideo(0, 10)">Cue Video 0 at 10s</button>
  </div>

  <script src="videoshots.js"></script>
  <script>
    const shortsVideos = [
      'https://www.youtube.com/shorts/ZDqo7XROuwM',
      'https://www.youtube.com/shorts/dQw4w9WgXcQ',
      'https://www.youtube.com/watch?v=L5sr0kgwjEQ',
      'https://www.youtube.com/watch?v=zxuiNQLgIrw'
    ];

    const normalVideos = [
      'https://www.youtube.com/watch?v=zxuiNQLgIrw',
      'https://www.youtube.com/watch?v=SGfb6y1j5x0',
      'https://www.youtube.com/watch?v=1swTK9FaCvY',
      'https://www.youtube.com/watch?v=L5sr0kgwjEQ',
    ];

    let shorts, normal;

    async function init() {
      shorts = new VideoShorts('#video-container-shorts', shortsVideos, {
        containerClass: 'videoshort-container',
        wrapperClass: 'videoshort-wrapper',
        itemClass: 'videoshort-item',
        skeletonClass: 'videoshort-skeleton',
        overlayClass: 'videoshort-overlay',
        playButtonClass: 'videoshort-play-button',
        muteButtonClass: 'videoshort-mute-button',
        lazy: true,
        width: '280px',
        aspectRatio: '9/16',
        muted: true,
        loop: true,
        controls: 1,
        onReady: (event, index, instance) => {
          console.log(`Short ${index} ready`);
        },
        onPlay: (event, index, instance) => {
          console.log(`Short ${index} started playing`);
        },
        onEnd: (event, index, instance) => {
          console.log(`Short ${index} ended`);
        }
      });

      normal = new VideoShorts('#video-container-normal', normalVideos, {
        containerClass: 'videoshort-container',
        wrapperClass: 'videoshort-wrapper',
        itemClass: 'videoshort-item',
        skeletonClass: 'videoshort-skeleton',
        overlayClass: 'videoshort-overlay',
        playButtonClass: 'videoshort-play-button',
        muteButtonClass: 'videoshort-mute-button',
        lazy: true,
        width: '480px',
        aspectRatio: '16/9',
        muted: true,
        loop: true,
        controls: 1,
        cueVideoDelay: 110,
        onReady: (event, index, instance) => {
          console.log(`Video ${index} ready`);
        },
        onPlay: (event, index, instance) => {
          console.log(`Video ${index} started playing`);
        },
        onEnd: (event, index, instance) => {
          console.log(`Video ${index} ended`);
        }
      });

      await Promise.all([shorts.init(), normal.init()]);
      console.log('All videos initialized');
    }

    init();
  </script>
</body>
</html>
